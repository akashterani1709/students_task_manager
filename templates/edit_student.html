<form action="/update_student/{{ student.student_id }}" method="POST">
    <input
        type="text"
        name="first_name"
        value="{{ student.first_name}}"
        class="form-control"
    >

    <input
        type="text"
        name="last_name"
        value="{{ student.last_name}}"
    >
    <button
    type="submit"
    cass="btn btn-success"
    >
        Update Student
    </button>
</form>
