{% extends 'layout.html' %}

{% block content %}

<h2>Assign Task </h2>

<form method="post">

    <div class="mb-3">

        <label>Student</label>

        <select name="student_id" class="form-control">
            
            {% for student in students %}

            <option value="{{ student.student_id }}">
                {{ student.first_name }} 
                {{ student.last_name }}
            </option>

            {% endfor %}

        </select>

    </div>

    <div class="mb-3">

        <label>Task</label>

        <select name="task_id" class="form-control">
            
            {% for tsk in tasks %}

            <option value="{{ tsk.task_id }}">
                {{ tsk.task_name }}
            </option>

            {% endfor %}

        </select>

    </div>

    <button type="submit" class="btn btn-primary">
        Assign Task
    </button>
        
</form>

{% endblock %}
